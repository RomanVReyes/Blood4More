<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Donante - ROMAN</title>
    <style>
        :root { --primary-red: #d32f2f; --hover-red: #b71c1c; --bg-color: #f4f7f6; --text-main: #333; --text-light: #666; --border: #ddd; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }
        h2 { color: var(--text-main); margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 15px; }
        .row { display: flex; gap: 15px; }
        .col { flex: 1; }
        label { display: block; margin-bottom: 5px; color: var(--text-light); font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; background-color: white; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--primary-red); outline: none; }
        .btn { width: 100%; background-color: var(--primary-red); color: white; border: none; padding: 12px; border-radius: 6px; font-size: 1rem; cursor: pointer; transition: 0.3s; font-weight: bold; margin-top: 15px; }
        .btn:hover { background-color: var(--hover-red); }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--text-light); text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: var(--primary-red); }
    </style>
</head>
<body>
    <div class="card">
        <h2>Registro de Donante</h2>
        <form action="/donante/registro" method="POST">
            <div class="form-group">
                <label>Nombre Completo:</label>
                <input type="text" name="nombre" placeholder="Ej. Juan Pérez" required>
            </div>
            
            <div class="row">
                <div class="form-group col">
                    <label>Correo Electrónico:</label>
                    <input type="email" name="email" placeholder="tu@correo.com" required>
                </div>
                <div class="form-group col">
                    <label>Contraseña:</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
            </div>
            
            <div class="row">
                <div class="form-group col">
                    <label>Edad:</label>
                    <input type="number" name="edad" min="18" max="65" required>
                </div>
                <div class="form-group col">
                    <label>Peso (kg):</label>
                    <input type="number" name="peso" min="50" step="0.1" required>
                </div>
                <div class="form-group col">
                    <label>Tipo de Sangre:</label>
                    <select name="tipoSangre" required>
                        <option value="" disabled selected>Selecciona</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn">Crear Cuenta</button>
        </form>
        <a href="/donante" class="back-link">Volver a opciones</a>
    </div>
</body>
</html>
