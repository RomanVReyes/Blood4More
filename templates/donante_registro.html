<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <title>Registro Donante - ROMAN</title>
    <style>
        :root { --primary-red: #d32f2f; --hover-red: #b71c1c; --bg-color: #f4f7f6; --text-main: #333; --text-light: #666; --border: #ddd; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 20px; }
        .card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 700px; }
        h2 { color: var(--text-main); margin-bottom: 10px; text-align: center; }
        .subtitle { text-align: center; color: var(--text-light); margin-bottom: 25px; font-size: 0.95rem; }
        
        .section-title { font-size: 1.1rem; color: var(--primary-red); margin: 25px 0 15px; border-bottom: 2px solid var(--bg-color); padding-bottom: 8px; }
        
        .form-group { margin-bottom: 15px; }
        .row { display: flex; gap: 15px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 200px; }
        
        label { display: block; margin-bottom: 5px; color: var(--text-light); font-size: 0.9rem; font-weight: 500; }
        input[type="text"], input[type="email"], input[type="password"], input[type="number"], input[type="tel"], select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; background-color: white; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--primary-red); outline: none; }
        
        .checkbox-group { display: flex; gap: 15px; align-items: center; margin-top: 5px; }
        .checkbox-label { display: flex; align-items: center; gap: 5px; font-weight: normal; cursor: pointer; }
        
        .btn { width: 100%; background-color: var(--primary-red); color: white; border: none; padding: 14px; border-radius: 6px; font-size: 1.05rem; cursor: pointer; transition: 0.3s; font-weight: bold; margin-top: 25px; }
        .btn:hover { background-color: var(--hover-red); }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--text-light); text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: var(--primary-red); }

        .scroll-box { 
            max-height: 120px; 
            overflow-y: auto; 
            border: 1px solid var(--border); 
            padding: 10px; 
            border-radius: 6px; 
            background: white; 
        }
        .scroll-box .checkbox-label { 
            margin-bottom: 8px; 
            display: flex; 
            align-items: center; 
        }

        @media (max-width: 600px) { .row { flex-direction: column; gap: 0; } }
    </style>
</head>
<body>
    <div class="card">
        <h2>Registro de Donante</h2>
        <p class="subtitle">Únete a la red y ayuda a salvar vidas.</p>
        
        <form action="/donante/registro" method="POST">
            
            <h3 class="section-title">1. Cuenta y Contacto</h3>
            <div class="form-group">
                <label>Nombre Completo:</label>
                <input type="text" name="nombre" placeholder="Ej. Juan Pérez" required>
            </div>
            
            <div class="row">
                <div class="form-group col">
                    <label>Correo Electrónico:</label>
                    <input type="email" name="email" placeholder="tu@correo.com" required>
                </div>
                <div class="form-group col">
                    <label>Contraseña:</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group col">
                    <label>Teléfono:</label>
                    <input type="tel" name="telefono" placeholder="10 dígitos" required>
                </div>
                <div class="form-group col">
                    <label>WhatsApp (Opcional):</label>
                    <input type="tel" name="whatsapp" placeholder="10 dígitos">
                </div>
            </div>

            <h3 class="section-title">2. Perfil Médico</h3>
            <div class="row">
                <div class="form-group col">
                    <label>Tipo de Sangre (y factor Rh):</label>
                    <select name="tipoSangre" required>
                        <option value="" disabled selected>Selecciona</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
                <div class="form-group col">
                    <label>Género:</label>
                    <select name="genero" required>
                        <option value="" disabled selected>Selecciona</option>
                        <option value="masculino">Masculino</option>
                        <option value="femenino">Femenino</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="form-group col">
                    <label>Edad:</label>
                    <input type="number" name="edad" min="18" max="65" required>
                </div>
                <div class="form-group col">
                    <label>Peso (kg):</label>
                    <input type="number" name="peso" min="50" step="0.1" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group col">
                    <label>Padecimientos Médicos (Opcional):</label>
                    <div class="scroll-box">
                        {{range .Padecimientos}}
                        <label class="checkbox-label">
                            <input type="checkbox" name="padecimientos" value="{{.ID}}"> {{.Nombre}}
                        </label>
                        {{end}}
                    </div>
                </div>
                <div class="form-group col">
                    <label>Medicamentos Actuales (Opcional):</label>
                    <div class="scroll-box">
                        {{range .Medicamentos}}
                        <label class="checkbox-label">
                            <input type="checkbox" name="medicamentos" value="{{.ID}}"> {{.Nombre}}
                        </label>
                        {{end}}
                    </div>
                </div>
            </div>

            <h3 class="section-title">3. Ubicación y Notificaciones</h3>
            <div class="form-group">
                <label>Dirección:</label>
                <input type="text" name="direccion" placeholder="Calle y número" required>

                <div class="form-group">
                    <label>Selecciona tu ubicación en el mapa:</label>
                    <div id="map" style="height: 300px; border-radius: 8px;"></div>
                </div>

                <!-- Campos ocultos -->
                <input type="hidden" name="latitud">
                <input type="hidden" name="longitud">
            </div>
            

            <div class="form-group">
                <label>¿Por dónde prefieres recibir notificaciones de urgencias?</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="notificaciones" value="whatsapp" checked> WhatsApp
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="notificaciones" value="correo" checked> Correo
                    </label>
                </div>
            </div>

            <button type="submit" class="btn">Completar Registro</button>
        </form>
        <a href="/donante" class="back-link">← Cancelar y volver a opciones</a>
    </div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const defaultLat = 19.4326;
    const defaultLng = -99.1332;

    const map = L.map('map').setView([defaultLat, defaultLng], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const marker = L.marker([defaultLat, defaultLng], { draggable: true }).addTo(map);

    function actualizarUbicacion(lat, lng) {
        document.querySelector('[name="latitud"]').value = lat;
        document.querySelector('[name="longitud"]').value = lng;

        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`)
            .then(res => res.json())
            .then(data => {
                if (data.display_name) {
                    document.querySelector('[name="direccion"]').value = data.display_name;
                }
            });
    }

    marker.on('dragend', function () {
        const pos = marker.getLatLng();
        actualizarUbicacion(pos.lat, pos.lng);
    });

    map.on('click', function (e) {
        marker.setLatLng(e.latlng);
        actualizarUbicacion(e.latlng.lat, e.latlng.lng);
    });

    // Intentar obtener ubicación real del usuario
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            map.setView([lat, lng], 15);
            marker.setLatLng([lat, lng]);

            actualizarUbicacion(lat, lng);
        });
    } else {
        actualizarUbicacion(defaultLat, defaultLng);
    }

});
</script>


</body>
</html>
